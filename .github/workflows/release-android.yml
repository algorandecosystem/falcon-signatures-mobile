  android:
    runs-on: macos-latest
#    needs: ['test']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Verify NDK installation
        run: $ANDROID_NDK_HOME/ndk-build --version

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install Go Mobile
        run: make install-go-mobile

      - name: Build
        run: make android

      - name: Rename artifact with tag version
        run: |
          GITHUB_TAG=${GITHUB_TAG} # Extract the version from the tag
          cp output/FalconAlgoSDK.aar output/falcon-signatures-mobile-sdk-${GITHUB_TAG}.aar
          echo "Renamed AAR to falcon-signatures-mobile-sdk-${GITHUB_TAG}.aar"
        env:
          GITHUB_TAG: ${{ github.ref_name }}

      - name: Archive Build Output
        uses: actions/upload-artifact@v7
        with:
          name: falcon-signatures-mobile-sdk-${{ github.ref_name }}.aar
          path: output/falcon-signatures-mobile-sdk-${{ github.ref_name }}.aar

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Publish to Local Bundle Repository
        env:
          GITHUB_TAG: ${{ github.ref_name }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          export VERSION_TAG=${GITHUB_TAG#v}  # Remove the leading 'v'
          ./gradlew :falcon-android-sdk:clean :falcon-android-sdk:publishAlgoSDKReleasePublicationToLocalRepository

      - name: Upload to Maven Central
        env:
          GITHUB_TAG: ${{ github.ref_name }}
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.RSA_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.RSA_GPG_PASSPHRASE }}
        run: |
          export VERSION_TAG=${GITHUB_TAG#v}  # Remove the leading 'v'
          ./gradlew :falcon-android-sdk:publishToMavenCentralPortal
